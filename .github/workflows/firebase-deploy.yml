name: Deploy to Firebase

on:
  push:
    branches: [main]
    paths:
      - "pas-inquire-app/**"
      - ".github/workflows/firebase-deploy.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation (OIDC)

env:
  PROJECT_ID: cms0057-pas-inquire
  WIF_PROVIDER: projects/664197318701/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  DEPLOY_SA: github-deployer@cms0057-pas-inquire.iam.gserviceaccount.com

concurrency:
  group: firebase-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pas-inquire-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pas-inquire-app/functions/package-lock.json

      - name: Install function dependencies
        working-directory: pas-inquire-app/functions
        run: npm ci

      - name: Syntax check
        run: for f in functions/index.js public/js/*.js public/js/tests/*.js; do node --check "$f"; done

      - name: Generate web config (firebaseConfig.js)
        env:
          APP_CHECK_SITE_KEY: ${{ vars.APP_CHECK_SITE_KEY }}
          ALLOWED_EMAILS: ${{ vars.ALLOWED_EMAILS }}
          ALLOWED_EMAIL_DOMAIN: ${{ vars.ALLOWED_EMAIL_DOMAIN }}
        run: |
          node -e '
            const fs = require("fs");
            const emails = (process.env.ALLOWED_EMAILS || "").split(",").map(s => s.trim()).filter(Boolean);
            const config = {
              apiKey: "AIzaSyA9z_vCf9W1h7pL1UDAPvjxU5enCtv2XXM",
              authDomain: "cms0057-pas-inquire.firebaseapp.com",
              projectId: "cms0057-pas-inquire",
              storageBucket: "cms0057-pas-inquire.firebasestorage.app",
              messagingSenderId: "664197318701",
              appId: "1:664197318701:web:3b2c9f8bfb68882e03d0a4"
            };
            const out =
              "// Generated by CI. Do not edit.\n" +
              "export const firebaseConfig = " + JSON.stringify(config, null, 2) + ";\n" +
              "export const APP_CHECK_SITE_KEY = " + JSON.stringify(process.env.APP_CHECK_SITE_KEY || "") + ";\n" +
              "export const ALLOWED_EMAILS = " + JSON.stringify(emails) + ";\n" +
              "export const ALLOWED_EMAIL_DOMAIN = " + JSON.stringify(process.env.ALLOWED_EMAIL_DOMAIN || "") + ";\n";
            fs.writeFileSync("public/js/firebaseConfig.js", out);
          '

      - name: Generate function runtime env
        working-directory: pas-inquire-app/functions
        run: |
          {
            echo "APP_CHECK_REQUIRED=${{ vars.APP_CHECK_REQUIRED || 'false' }}"
            echo "ALLOWED_EMAILS=${{ vars.ALLOWED_EMAILS }}"
            echo "ALLOWED_EMAIL_DOMAIN=${{ vars.ALLOWED_EMAIL_DOMAIN }}"
          } > ".env.${PROJECT_ID}"

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}

      - name: Deploy hosting + functions
        # google-github-actions/auth exports GOOGLE_APPLICATION_CREDENTIALS, which firebase-tools uses.
        run: npx --yes firebase-tools@13 deploy --only hosting,functions --project "$PROJECT_ID" --non-interactive
